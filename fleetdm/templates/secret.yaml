{{- if .Values.mysql.auth.password }}
# Local dev only — in production provision this secret externally
# (ESO or Sealed Secrets) with the same name and keys before deploying.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleetdm.fullname" . }}-mysql
  labels:
    {{- include "fleetdm.labels" . | nindent 4 }}
    app.kubernetes.io/component: mysql
type: Opaque
stringData:
  mysql-root-password: {{ .Values.mysql.auth.rootPassword | quote }}
  mysql-password: {{ .Values.mysql.auth.password | quote }}
{{- end }}
