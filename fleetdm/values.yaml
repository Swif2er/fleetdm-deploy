# FleetDM 
replicaCount: 1

image:
  repository: fleetdm/fleet
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

serviceAccount:
  create: false
  name: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 5
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /healthz
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 3

fleet:
  serverTLS: false    # keep false when TLS is terminated at ingress
  mysqlAddress: ""    # if left empty will be autogenerated as <release-name>-mysql:3306
  redisAddress: ""    # if left empty will be autogenerated as <release-name>-redis:6379

# not set for local dev — tune for production based on observed usage
resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}
podSecurityContext: {}
securityContext: {}

imagePullSecrets: []

volumeMounts: []
volumes: []

# mysql
mysql:
  image:
    repository: mysql
    tag: "8.0"
    pullPolicy: IfNotPresent
  auth:
    database: fleet
    username: fleet
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  # not set for local dev — tune for production based on observed usage
  resources: {}

# redis 
redis:
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  # persistence disabled intentionally — Redis is used as cache only
  resources: {}   # not set for local dev — tune for production based on observed usage
